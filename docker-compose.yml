services:
  postgres:
    image: postgres:18-alpine
    container_name: trace-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
      POSTGRES_DB: trace
    ports: ['55432:5432']
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U trace']
      interval: 2s
      timeout:  5s
      retries:  10
    volumes:
      - pgdata:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    container_name: trace-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY:-trace}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-tracetrace}
    ports: ['9000:9000', '9001:9001']
    healthcheck:
      test:     ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout:  3s
      retries:  10
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    container_name: trace-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-trace} ${S3_SECRET_KEY:-tracetrace} &&
      mc mb --ignore-existing local/${S3_BUCKET:-trace-attachments} &&
      echo 'bucket ${S3_BUCKET:-trace-attachments} ready'
      "

  app:
    profiles: ['app']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trace-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV:                    production
      PORT:                        '3000'
      ORIGIN:                      ${ORIGIN:-http://localhost:7777}
      DATABASE_URL:                postgres://trace:trace@postgres:5432/trace
      TRACE_AUTH_SECRET:           ${TRACE_AUTH_SECRET:?TRACE_AUTH_SECRET is required (openssl rand -hex 32)}
      TRACE_BOOTSTRAP_ADMIN_EMAIL: ${TRACE_BOOTSTRAP_ADMIN_EMAIL:-}
      S3_ENDPOINT:                 http://minio:9000
      S3_REGION:                   us-east-1
      S3_BUCKET:                   ${S3_BUCKET:-trace-attachments}
      S3_ACCESS_KEY:               ${S3_ACCESS_KEY:-trace}
      S3_SECRET_KEY:               ${S3_SECRET_KEY:-tracetrace}
    ports: ['${TRACE_PORT:-7777}:3000']

volumes:
  pgdata:
  miniodata:
