services:
  postgres:
    image: postgres:18-alpine
    container_name: trace-pg
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
      POSTGRES_DB: trace
    ports: ['55432:5432']
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U trace']
      interval: 2s
      timeout:  5s
      retries:  10
    volumes:
      - pgdata:/var/lib/postgresql

  minio:
    image: minio/minio:latest
    container_name: trace-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER:     trace
      MINIO_ROOT_PASSWORD: tracetrace
    ports: ['9000:9000', '9001:9001']
    healthcheck:
      test:     ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout:  3s
      retries:  10
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    container_name: trace-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 trace tracetrace &&
      mc mb --ignore-existing local/trace-attachments &&
      echo 'bucket trace-attachments ready'
      "

volumes:
  pgdata:
  miniodata:
