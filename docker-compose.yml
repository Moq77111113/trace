services:
  postgres:
    image: postgres:18-alpine
    container_name: trace-pg
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
      POSTGRES_DB: trace
    ports: ['5432:5432']
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U trace']
      interval: 2s
      timeout:  5s
      retries:  10
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: trace-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER:     trace
      MINIO_ROOT_PASSWORD: tracetrace
    ports: ['9000:9000', '9001:9001']
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
